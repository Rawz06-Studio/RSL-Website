name: Release

on:
  push:
    branches:
      - develop

jobs:
  release:
    uses: RawZ06-Studio/.github/.github/workflows/node-ci-preprod.yml@main
    permissions:
      contents: write
    with:
      publishable: false       # application, pas de publish npm
    secrets: inherit
  sonar:
    needs: release
    uses: RawZ06-Studio/.github/.github/workflows/node-ci-sonar.yml@main
    with:
      node_version: '24'
    secrets: inherit
  docker:
    needs: release
    uses: RawZ06-Studio/.github/.github/workflows/docker-build-push.yml@main
    with:
      image_name: rslwebsite-preprod
      dokploy_app_id: GU04XWmOgLE2yp0G4QajH
    secrets: inherit
